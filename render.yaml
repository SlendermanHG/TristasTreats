services:
  - type: web
    name: tristastreats-site
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: tristastreats-data
      mountPath: /opt/render/project/src/data-store
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: SESSION_SECRET
        generateValue: true
      - key: DB_PATH
        value: /opt/render/project/src/data-store/tristas-treats.db
      - key: OPENAI_MODEL
        value: gpt-5-mini
